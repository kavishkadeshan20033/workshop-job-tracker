services:
  - type: web
    name: workshop-job-tracker
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: DATABASE_URL
        fromDatabase:
          name: workshop-db
          property: connectionString

databases:
  - name: workshop-db
    plan: free
    databaseName: workshop_job_tracker
    user: workshop_user
