services:
  - type: web
    name: workshop-job-tracker-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: DB_PATH
        value: ./database/workshop.db
      - key: CLIENT_URL
        value: https://your-app.vercel.app
